body:
  text: 黃書黃書黃書黃書無上洞靈混沌自然玉清東方青靈玉虛真人使者九千萬人無上洞靈混沌自然玉清南方赤靈玉虛真人使者九千萬人無上洞靈混沌自然玉清西方白靈玉虛真人使者九千萬人無上洞靈混沌自然玉清北方黑靈玉虛真人使者九千萬人無上洞靈混沌自然玉清中央黃靈玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙青帝玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙赤帝玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙白帝玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙黑帝玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙黃帝玉虛真人使者九千萬人無上洞靈混沌自然玉清飛仙玉虛左官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛右官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛前官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛後官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛天官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛地官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛水官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛陰官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛陽官使者各九千九萬人無上洞靈混沌自然玉清飛仙玉虛都官使者各九千九萬人黃書黃書黃書高上紫虛空洞玉清自然青素神仙真官五帝功曹八十二人高上紫虛空洞玉清自然赤素神仙真官三五功曹八十二人高上紫虛空洞玉清自然白素神仙真官治病功曹八十二人高上紫虛空洞玉清自然黑素神仙真官陰官使者八十二人高上紫虛空洞玉清自然黃素神仙真官陽官使者八十二人高上紫虛空洞玉清自然更生天仙真人都官使者八十二人高上紫虛空洞玉清自然更生地仙真人上官使者八十二人高上紫虛空洞玉清自然更生飛仙真人中官使者八十二人高上紫虛空洞玉清自然更生天仙兵馬九騎使者八十二人高上紫虛空洞玉清自然更生日月兵馬九騎使者八十二人高上紫虛空洞玉清自然更生九宫兵馬九騎使者八十二人高上紫虛空洞玉清自然更生三河兵馬九騎使者八十二人高上紫虛空洞玉清自然更生四海兵馬九騎使者八十二人高上紫虛空洞玉清自然更生五嶽兵馬九騎使者八十二人高上紫虛空洞玉清自然更生四瀆兵馬九騎使者八十二人高上紫虛空洞玉清自然更生九江兵馬九騎使者八十二人高上紫虛空洞玉清自然更生水府兵馬九騎使者八十二人高上紫虛空洞玉清自然更生淮濟兵馬九騎使者八十二人符並青書洞清虛玄至真自然靈飛隱書玉清左官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清右官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清上官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清中官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清下官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清天官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清地官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清水官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清木官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清火官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清金官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清水官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清土官使者八十萬億衆洞清虛亥至真自然靈飛隱書玉清日官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清月官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清星官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清都官使者八十萬億衆洞清虛玄至真自然靈飛隱書玉清陽官直使八十萬億衆洞清虛玄至真自然靈飛隱書玉清陰官直使八十萬億衆洞清虛玄至真自然靈飛隱書玉清監官直使八十萬億衆宫圖取宜裝謁請大洞玉清宫中左仙右仙上仙中仙前仙後仙下仙各十萬人謁請大洞玉清上宫左真右真上真中真下真前真後真各十萬人謁請大洞玉清上宫飛天神王飛天力士手持弓弩使者各十萬人謁請大洞玉清上宫天仙地仙神仙吏兵力士各一十萬人謁請大洞玉清上宫左官右官天官地官水官吏兵力士十萬人謁請大洞玉清上宫陰官陽官九天靈官使者力士各十萬人謁請大洞玉清上宫左仙童右仙童左玉女右玉女各十萬人謁請大洞玉清上宫飛步天師衛經力士典經玉郎各十萬人謁請大洞玉清上宫練身神仙捧香力士扶神兵士使者各十萬人謁請大洞玉清上宫三河四海九江水府練骨仙人各十萬人謁請大洞玉清上宫五嶽四瀆十二河源練五藏仙人各十萬人謁請大洞玉清上宫超仙羽步飛行神仙傳香力士各三千人依法傳付帝度氣從氣天中來天超尸天生胎天養氣天侍魄帝領籍於歃丹盟約依法啓付無等等玉清隱書祕訣誓願尅修以期神仙遊行玉清極樂之府一千二百真人仙官玉童玉女吏兵軍將力士使者萬萬千億侍護受者身速獲升度九祖父母貽生天堂上資皇祚昌熾天長九廟登真九幽悉捨長夜蒙原惡根絶息三塗亦斷如自違負中道破敗九祖沉淪身謝三光不得怨道咎師一如盟文律令保舉監度度師上清大洞三景玉清隱書訣籙
