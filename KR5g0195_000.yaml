front:
  text: 上清大洞三景玉清隱書訣籙集三元始天王清齋千日於玉清宫中告盟十天無聲無色無形無名無祖無宗無極洞靈玉清九玄自然無數劫道授大洞三景三元玉清金虎鳳文三天玉童玉女領付後學合有仙名應於玉清真人定名玄臺金藏策文瓊禮奉迎真靈飛行玉清仰瞻洞靈自然更生侍衛上真檢名仙格制魔役靈降至金臺雲車玉軿維某號某年太歲某月日子某州郡縣鄉里男女生姓名年若干歲某月日時生自小割愛親奉玄文晨夜翹勤焚修不輟敢備香信質盟含丹詣三洞法師某君門下請受上清大洞三景玉清隱書訣籙謹依先師旨教對齋告盟今齎信詣三洞法師臣某乙於壇中上告萬靈下告五嶽三河九源咸所知聞臣今依法付授受法之後若違盟負信七祖父母及受者身長受左右官考履刀山吞火食炭二十四獄三徒五苦萬劫無恨唯乞啓付降至真靈玉童玉女神官將吏扶護受者之身脫削罪籍上名九天仙名玉曆久視長生七祖父母貽生天堂速得升度皇祚興隆九廟登真一如盟文天官律令
